name: Sugerencia de mod
description: Sugiere un mod nuevo para añadir o reemplazar en el modpack.
labels: mod
body:
  - type: markdown
    attributes:
      value: |
        Antes de sugerir un mod, [busca en los issues existentes](https://github.com/Potatously-Optimized/potatously-optimized/issues) para evitar duplicados.
        Revisa también los [criterios de aceptación](https://github.com/Potatously-Optimized/potatously-optimized/blob/main/CONTRIBUTING.md) antes de continuar.

  - type: input
    attributes:
      label: Enlace en Modrinth
      placeholder: "https://modrinth.com/mod/..."
    validations:
      required: false

  - type: input
    attributes:
      label: Enlace en CurseForge
      placeholder: "https://www.curseforge.com/minecraft/mc-mods/..."
    validations:
      required: false

  - type: input
    attributes:
      label: Enlace en GitHub u otra fuente
      placeholder: "https://github.com/..."
    validations:
      required: false

  - type: input
    attributes:
      label: Tamaño del archivo
      description: Se puede encontrar en Modrinth, CurseForge o GitHub Releases.
      placeholder: "123 KB"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Licencia
      description: Se puede encontrar en el sidebar de Modrinth, CurseForge o GitHub.
      options:
        - All Rights Reserved / ARR
        - (cualquier otra licencia)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Qué hace este mod
      description: Descripción breve de su funcionalidad.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Por qué debería incluirse
      description: Cómo beneficia al modpack sin alterar mecánicas vanilla.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Por qué no debería incluirse
      description: Incluye cualquier desventaja o limitación conocida del mod.
      placeholder: "Ejemplos: aún en beta, depende de algo, tiene opciones confusas, no es compatible con servidores vanilla, etc."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Información adicional
      description: Cualquier otro dato relevante.
    validations:
      required: false

  - type: input
    attributes:
      label: Discusión en Discord
      description: Si ya lo comentaste en el Discord, incluye el enlace (opcional).
      placeholder: "https://discord.com/channels/1282857477754585108/..."
    validations:
      required: false