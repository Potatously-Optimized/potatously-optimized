name: Reporte de bug
description: Reporta un problema con el modpack en su estado sin modificar. Para preguntas de uso, acude al Discord.
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        Antes de reportar, [busca en los issues existentes](https://github.com/Potatously-Optimized/potatously-optimized/issues) para evitar duplicados.

  - type: textarea
    attributes:
      label: Descripción del bug
      description: Describe el problema con claridad. Para crashes, sube el log a [mclo.gs](https://mclo.gs/) e incluye el enlace.
    validations:
      required: true

  - type: input
    attributes:
      label: Versión del modpack
      description: Encuéntrala en la esquina inferior derecha del menú principal.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Launcher
      options:
        - Modrinth App
        - Prism Launcher
        - ATLauncher
        - MultiMC
        - Minecraft Launcher (vanilla)
    validations:
      required: true

  - type: textarea
    attributes:
      label: Contexto adicional
      description: Capturas de pantalla, video, o cualquier información extra. Si es un crash, incluye el enlace de mclo.gs.
    validations:
      required: false

  - type: input
    attributes:
      label: Discusión en Discord
      description: Si ya lo comentaste en el Discord, incluye el enlace (opcional).
      placeholder: "https://discord.com/channels/1282857477754585108/..."
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Confirmación
      options:
        - label: Este reporte es sobre el modpack sin modificar. No añadí mods ni resource packs adicionales. Si no es así, entiendo que debo usar el canal de soporte del Discord.
          required: true