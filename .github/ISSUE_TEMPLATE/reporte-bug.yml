name: 🐛 Reporte de Bug
description: Reporta un problema o error en el modpack
title: "[BUG] "
labels: ["bug", "necesita revisión"]
body:
  - type: markdown
    attributes:
      value: |
        ## Gracias por reportar un bug
        Por favor llena este formulario con la mayor información posible. Esto nos ayudará a resolver el problema más rápido.
        
        **Antes de continuar, verifica que:**
        - ✅ Estás usando la última versión del modpack
        - ✅ El bug no ha sido reportado antes
        - ✅ No es causado por mods adicionales que añadiste

  - type: textarea
    id: descripcion
    attributes:
      label: 📝 Descripción del Bug
      description: Describe claramente qué es lo que está mal
      placeholder: Ejemplo "El juego crashea al abrir el inventario"
    validations:
      required: true

  - type: textarea
    id: pasos
    attributes:
      label: 🔄 Pasos para Reproducir
      description: ¿Cómo podemos reproducir este bug?
      placeholder: |
        1. Inicia el juego
        2. Crea un mundo nuevo
        3. Presiona 'E' para abrir inventario
        4. El juego crashea
    validations:
      required: true

  - type: textarea
    id: esperado
    attributes:
      label: ✅ Comportamiento Esperado
      description: ¿Qué esperabas que sucediera?
      placeholder: El inventario debería abrirse normalmente
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Comportamiento Actual
      description: ¿Qué sucede en realidad?
      placeholder: El juego se congela y crashea al abrir el inventario
    validations:
      required: true

  - type: input
    id: version-modpack
    attributes:
      label: 📦 Versión del Modpack
      description: ¿Qué versión de Potatously Optimized estás usando?
      placeholder: "Ejemplo: 1.0.0-beta.3"
    validations:
      required: true

  - type: dropdown
    id: version-minecraft
    attributes:
      label: 🎮 Versión de Minecraft
      description: ¿En qué versión de Minecraft ocurre el bug?
      options:
        - 1.21
        - 1.21.1
        - 1.21.2
        - 1.21.3
        - Otra (especificar en descripción)
    validations:
      required: true

  - type: dropdown
    id: sistema-operativo
    attributes:
      label: 💻 Sistema Operativo
      description: ¿Qué sistema operativo usas?
      options:
        - Windows 11
        - Windows 10
        - Linux (especificar distro en descripción)
        - macOS
        - Otro
    validations:
      required: true

  - type: textarea
    id: specs
    attributes:
      label: 🖥️ Especificaciones del PC
      description: |
        Ayúdanos con información de tu hardware
      placeholder: |
        RAM asignada a Minecraft: 6GB
        RAM total del sistema: 16GB
        CPU: Intel Core i5-9400F
        GPU: NVIDIA GTX 1650
        Java: Java 21
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs
      description: |
        Por favor pega el contenido del archivo `latest.log` (ubicado en `.minecraft/logs/`)
        O sube el archivo a https://mclo.gs y pega el enlace aquí
      placeholder: Pega los logs aquí o enlace de mclo.gs
    validations:
      required: false

  - type: textarea
    id: capturas
    attributes:
      label: 📸 Capturas de Pantalla
      description: Si es posible, añade capturas de pantalla del problema
      placeholder: Arrastra imágenes aquí o pega enlaces
    validations:
      required: false

  - type: textarea
    id: mods-adicionales
    attributes:
      label: 🔧 Mods Adicionales
      description: ¿Añadiste mods que no vienen en el modpack?
      placeholder: Lista de mods adicionales que instalaste (si aplica)
    validations:
      required: false

  - type: textarea
    id: contexto
    attributes:
      label: 📋 Contexto Adicional
      description: Cualquier otra información relevante
      placeholder: Información extra que pueda ayudar
    validations:
      required: false

  - type: checkboxes
    id: verificaciones
    attributes:
      label: ✔️ Verificaciones
      description: Confirma que has hecho lo siguiente
      options:
        - label: He buscado en issues existentes y este bug no ha sido reportado
          required: true
        - label: Estoy usando la última versión del modpack
          required: true
        - label: He probado sin mods adicionales (si añadí alguno)
          required: false
        - label: He leído la guía de contribución
          required: true